<!--
PROMPT 
Stwórz nowoczesną i estetyczną stronę HTML umożliwiającą wysyłanie wiadomości email
za pośrednictwem usługi MailSender API.

Wymagania:
- pola: odbiorca, temat, treść wiadomości, token JWT
- nowoczesny wygląd (glassmorphism / gradient / responsive design)
- użyj czystego HTML, CSS i JavaScript
- formularz powinien wysyłać POST request do endpointu /mail/send
- token JWT ma być wysyłany w nagłówku Authorization Bearer
- pokaż komunikat sukcesu lub błędu
- strona ma działać bez frameworków frontendowych
- kod ma być czytelny i gotowy do uruchomienia
-->

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MailSender Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #7c6fff;
            --accent-2: #ff6fd8;
            --accent-3: #43e9b5;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --border-focus: rgba(124, 111, 255, 0.6);
            --text: #f0eeff;
            --text-muted: rgba(240, 238, 255, 0.5);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #06060f;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-x: hidden;
            color: var(--text);
        }

        /* ── Animated background ── */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            animation: drift 12s ease-in-out infinite alternate;
        }
        body::before {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124,111,255,0.22) 0%, transparent 70%);
            top: -160px;
            left: -160px;
        }
        body::after {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,111,216,0.18) 0%, transparent 70%);
            bottom: -120px;
            right: -120px;
            animation-direction: alternate-reverse;
            animation-duration: 15s;
        }
        .blob-3 {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(67,233,181,0.12) 0%, transparent 70%);
            bottom: 20%;
            left: 30%;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: drift 18s ease-in-out infinite alternate;
        }
        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }

        /* ── Grid overlay ── */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            background: rgba(255,255,255,0.035);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 44px 44px 40px;
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.06) inset,
                0 32px 80px rgba(0,0,0,0.5),
                0 0 60px rgba(124,111,255,0.06);
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Header ── */
        .card-header {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(124,111,255,0.3), rgba(255,111,216,0.2));
            border: 1px solid rgba(124,111,255,0.35);
            margin-bottom: 18px;
            position: relative;
        }
        .logo-wrap::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 21px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(124,111,255,0.6), rgba(255,111,216,0.4));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }
        .logo-icon {
            font-size: 28px;
            line-height: 1;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.65));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin-bottom: 32px;
        }

        /* ── Form fields ── */
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        label .label-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            outline: none;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }
        input::placeholder,
        textarea::placeholder {
            color: rgba(240,238,255,0.28);
        }
        input:hover,
        textarea:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.18);
        }
        input:focus,
        textarea:focus {
            background: rgba(124,111,255,0.07);
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(124,111,255,0.12), 0 0 20px rgba(124,111,255,0.08);
        }
        textarea {
            resize: vertical;
            min-height: 140px;
            line-height: 1.6;
        }

        /* Token field special */
        .token-field {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        /* ── Button ── */
        .btn-wrap {
            margin-top: 28px;
            position: relative;
        }
        .btn-glow {
            position: absolute;
            inset: -2px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            opacity: 0;
            filter: blur(8px);
            transition: opacity 0.3s;
            pointer-events: none;
        }
        button {
            position: relative;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #7c6fff, #b065f5, #ff6fd8);
            background-size: 200% 200%;
            background-position: 0% 50%;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s, background-position 0.5s;
            z-index: 1;
        }
        button:hover {
            background-position: 100% 50%;
            transform: translateY(-2px);
        }
        button:hover + .btn-glow,
        button:focus + .btn-glow {
            opacity: 0.5;
        }
        button:active {
            transform: translateY(0px) scale(0.99);
        }
        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }
        .btn-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-icon {
            font-size: 16px;
            transition: transform 0.3s;
        }
        button:hover .btn-icon {
            transform: translateX(3px);
        }

        /* spinner */
        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Messages ── */
        .message {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .message.visible {
            display: flex;
        }
        .message-icon {
            font-size: 18px;
            flex-shrink: 0;
        }
        .success {
            background: rgba(67,233,181,0.1);
            border: 1px solid rgba(67,233,181,0.35);
            color: #43e9b5;
        }
        .error {
            background: rgba(255,80,80,0.1);
            border: 1px solid rgba(255,80,80,0.35);
            color: #ff7070;
        }

        /* ── Footer tag ── */
        .footer-tag {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: rgba(240,238,255,0.2);
            letter-spacing: 0.04em;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .card {
                padding: 30px 24px 28px;
                border-radius: 22px;
            }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="blob-3"></div>
<div class="grid-overlay"></div>

<div class="card">

    <div class="card-header">
        <div class="logo-wrap">
            <span class="logo-icon">✉️</span>
        </div>
        <h1>MailSender</h1>
        <p class="subtitle">Wysyłanie wiadomości email przez API</p>
    </div>

    <div class="divider"></div>

    <form id="mailForm">

        <div class="form-group">
            <label for="token">
                <span class="label-dot"></span>Token JWT
            </label>
            <input
                type="text"
                id="token"
                class="token-field"
                placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                required
            />
        </div>

        <div class="form-group">
            <label for="receiver">
                <span class="label-dot"></span>Odbiorca
            </label>
            <input
                type="email"
                id="receiver"
                placeholder="example@email.com"
                required
            />
        </div>

        <div class="form-group">
            <label for="subject">
                <span class="label-dot"></span>Temat
            </label>
            <input
                type="text"
                id="subject"
                placeholder="Temat wiadomości"
                required
            />
        </div>

        <div class="form-group">
            <label for="content">
                <span class="label-dot"></span>Treść wiadomości
            </label>
            <textarea
                id="content"
                placeholder="Napisz wiadomość..."
                required
            ></textarea>
        </div>

        <div class="btn-wrap">
            <button type="submit" id="submitBtn">
                <span class="btn-inner">
                    <span class="spinner" id="spinner"></span>
                    <span id="btnText">Wyślij wiadomość</span>
                    <span class="btn-icon" id="btnIcon">→</span>
                </span>
            </button>
            <div class="btn-glow"></div>
        </div>

    </form>

    <div id="responseMessage" class="message">
        <span class="message-icon" id="msgIcon"></span>
        <span id="msgText"></span>
    </div>

    <p class="footer-tag">MAILSENDER API · 2026</p>
</div>

<script>
    const form         = document.getElementById("mailForm");
    const submitBtn    = document.getElementById("submitBtn");
    const spinner      = document.getElementById("spinner");
    const btnText      = document.getElementById("btnText");
    const btnIcon      = document.getElementById("btnIcon");
    const responseMsg  = document.getElementById("responseMessage");
    const msgIcon      = document.getElementById("msgIcon");
    const msgText      = document.getElementById("msgText");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const token    = document.getElementById("token").value;
        const receiver = document.getElementById("receiver").value;
        const subject  = document.getElementById("subject").value;
        const content  = document.getElementById("content").value;

        const payload = {
            to: receiver,
            subject: subject,
            body: content
        };

        setLoading(true);
        hideMessage();

       try {
            const response = await fetch("http://localhost:5242/mail/send", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                showMessage("Wiadomość została wysłana pomyślnie!", true);
                form.reset();
            } else {
                const errorText = await response.text();
                showMessage("Błąd: " + errorText, false);
            }
        } catch (error) {
            showMessage("Nie udało się połączyć z API.", false);
        } finally {
            setLoading(false);
        }
    });

    function setLoading(active) {
        submitBtn.disabled = active;
        spinner.style.display  = active ? "block" : "none";
        btnIcon.style.display  = active ? "none"  : "inline";
        btnText.textContent    = active ? "Wysyłanie..." : "Wyślij wiadomość";
    }

    function showMessage(message, success) {
        msgIcon.textContent = success ? "✓" : "✕";
        msgText.textContent = message;
        responseMsg.className = "message visible " + (success ? "success" : "error");
    }

    function hideMessage() {
        responseMsg.className = "message";
    }
</script>

</body>
</html>
